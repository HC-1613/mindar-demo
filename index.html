<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

    <style>
        :root {
            --bg-panel: rgba(0, 0, 0, 0.55);
            --bg-btn: rgba(255, 255, 255, 0.1);
            --bg-btn-active: rgba(76, 175, 80, 0.5);
            --border-btn: rgba(255, 255, 255, 0.35);
            --color-text: #fff;
            --radius-pill: 26px;
            --radius-round: 50%;
            --btn-size: 41px;
            --rot-btn-size: 28px;
            --tap-highlight: transparent;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: var(--tap-highlight);
            user-select: none; -webkit-user-select: none;
        }

        #hint {
            position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.8); font-family: system-ui, sans-serif; font-size: 11px;
            background: var(--bg-panel); padding: 5px 14px; border-radius: 12px;
            z-index: 100; pointer-events: none; white-space: nowrap;
        }
        #status {
            position: fixed; top: 38px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.5); font-family: system-ui, sans-serif; font-size: 10px;
            z-index: 100; pointer-events: none;
        }
        #info-label {
            position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: var(--color-text); padding: 10px 24px;
            border-radius: 22px; font-family: system-ui, sans-serif; font-size: 15px;
            pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 100;
        }
        #info-label.visible { opacity: 1; }
        #toast {
            position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: var(--color-text); padding: 8px 20px;
            border-radius: 20px; font-family: system-ui, sans-serif; font-size: 13px;
            pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 110; white-space: nowrap;
        }
        #toast.visible { opacity: 1; }
        #anim-label {
            position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%);
            color: #ff9800; font-family: system-ui, sans-serif; font-size: 12px; font-weight: bold;
            pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 100;
            text-shadow: 0 0 6px rgba(0,0,0,0.8);
        }
        #anim-label.visible { opacity: 1; }

        #toolbar {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 100;
            display: flex; flex-direction: column; align-items: center;
            background: rgba(0,0,0,0.6); padding: 4px 10px 8px 10px; border-radius: var(--radius-pill);
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        }
        #toolbar-rot {
            display: flex; gap: 4px; align-items: center; padding: 4px 0 6px 0;
        }
        #toolbar-rot .axis-label {
            color: rgba(255,255,255,0.55); font-family: system-ui, sans-serif;
            font-size: 9px; font-weight: bold; width: 12px; text-align: center;
        }
        .rot-btn {
            width: var(--rot-btn-size); height: var(--rot-btn-size); border-radius: var(--radius-round);
            border: 1px solid var(--border-btn); background: var(--bg-btn); color: var(--color-text);
            font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .rot-btn:active { background: rgba(255,255,255,0.3); }

        #toolbar-func {
            display: flex; gap: 7px; flex-wrap: wrap; justify-content: center;
        }
        #toolbar-func button {
            width: var(--btn-size); height: var(--btn-size); border-radius: var(--radius-round);
            border: 1.5px solid var(--border-btn); background: var(--bg-btn); color: var(--color-text);
            font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.15s, border-color 0.15s;
        }
        #toolbar-func button:active { background: rgba(255,255,255,0.3); }
        #toolbar-func button.active { background: var(--bg-btn-active); border-color: #4caf50; }
    </style>
</head>

<body>
    <div id="hint">单指旋转视角 / 双指缩放</div>
    <div id="status"></div>
    <div id="info-label"></div>
    <div id="anim-label"></div>
    <div id="toast"></div>

    <div id="toolbar">
        <div id="toolbar-rot">
            <span class="axis-label">X</span>
            <button class="rot-btn" id="btn-rx-n" title="绕X轴负转">↺</button>
            <button class="rot-btn" id="btn-rx-p" title="绕X轴正转">↻</button>
            <span class="axis-label">Y</span>
            <button class="rot-btn" id="btn-ry-n" title="绕Y轴负转">↺</button>
            <button class="rot-btn" id="btn-ry-p" title="绕Y轴正转">↻</button>
            <span class="axis-label">Z</span>
            <button class="rot-btn" id="btn-rz-n" title="绕Z轴负转">↺</button>
            <button class="rot-btn" id="btn-rz-p" title="绕Z轴正转">↻</button>
        </div>
        <div id="toolbar-func">
            <button id="btn-scaleup" title="放大">➕</button>
            <button id="btn-scaledn" title="缩小">➖</button>
            <button id="btn-reset" title="重置">↺</button>
            <button id="btn-info" title="信息">ℹ️</button>
            <button id="btn-autorot" title="自动旋转">▶</button>
            <button id="btn-anim" title="播放动画">▶️</button>
        </div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" smooth-ar>
            <a-gltf-model id="model-0" data-info="图书馆模型" src="library.glb"
                position="0 0 0" rotation="90 0 0" scale="0.005 0.005 0.005"></a-gltf-model>
        </a-entity>
        <a-entity mindar-image-target="targetIndex: 1" smooth-ar>
            <a-gltf-model id="model-1" data-info="单动画模型" src="dying.glb"
                position="0 0 0" scale="0.1 0.1 0.1"></a-gltf-model>
        </a-entity>
        <a-entity mindar-image-target="targetIndex: 2" smooth-ar>
            <a-gltf-model id="model-2" data-info="多动画模型" src="player.glb"
                position="0 0 0" scale="0.1 0.1 0.1"></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const CONST = {
            MODEL_COUNT: 3,
            MODEL_IDS: ['model-0', 'model-1', 'model-2'],
            ROT_STEP: 30,
            SCALE_UP: 1.2,
            SCALE_DOWN: 0.8,
            WHEEL_FACTOR: 0.9,
            SWIPE_SENSITIVITY: 0.5,
            AUTO_ROT_SPEED: { x: 0.3, y: 0.6, z: 0.2 },
            INFO_DURATION: 2000,
            TOAST_DURATION: 1800,
            ANIM_LABEL_DURATION: 1500,
            FALLBACK_DELTA_CAP: 0.1,
            PLAYER_ANIM_SEQUENCE: ['idle', 'walk', 'run', 'die'],
            PLAYER_LOOP_ANIMS: new Set(['idle', 'walk', 'run']),
            VIBRATE: {
                CLICK: 10, ANIM_START: 20, INFO: 25, RESET: [10, 30, 10],
            },
        };

        const vibrate = (p) => navigator.vibrate && navigator.vibrate(p);

        let toastTimer;
        const toastEl = document.getElementById('toast');
        const animLabelEl = document.getElementById('anim-label');

        const showToast = (msg) => {
            clearTimeout(toastTimer);
            toastEl.textContent = msg;
            toastEl.classList.add('visible');
            toastTimer = setTimeout(() => toastEl.classList.remove('visible'), CONST.TOAST_DURATION);
        };

        let animLabelTimer;
        const showAnimLabel = (msg) => {
            clearTimeout(animLabelTimer);
            animLabelEl.textContent = msg;
            animLabelEl.classList.add('visible');
            animLabelTimer = setTimeout(() => animLabelEl.classList.remove('visible'), CONST.ANIM_LABEL_DURATION);
        };

        // ---------- smooth-ar ----------
        AFRAME.registerComponent('smooth-ar', {
            schema: {
                posFactor: { default: 0.25 },
                rotFactor: { default: 0.35 },
                minDelta: { default: 0.0005 }
            },
            init() {
                this.smoothedPos = new THREE.Vector3();
                this.smoothedRot = new THREE.Vector3();
                this.rawPos = new THREE.Vector3();
                this.rawRot = new THREE.Vector3();
                this.initialized = false;
            },
            tick() {
                const el = this.el;
                const pos = el.getAttribute('position');
                const rot = el.getAttribute('rotation');
                if (!this.initialized) {
                    this.smoothedPos.set(pos.x, pos.y, pos.z);
                    this.smoothedRot.set(rot.x, rot.y, rot.z);
                    this.initialized = true;
                    return;
                }
                this.rawPos.set(pos.x, pos.y, pos.z);
                this.rawRot.set(rot.x, rot.y, rot.z);
                const { posFactor: pf, rotFactor: rf, minDelta } = this.data;
                const dx = this.rawPos.x - this.smoothedPos.x;
                const dy = this.rawPos.y - this.smoothedPos.y;
                const dz = this.rawPos.z - this.smoothedPos.z;
                const dist = Math.sqrt(dx*dx+dy*dy+dz*dz);
                if (dist < minDelta) {
                    el.setAttribute('position', this.smoothedPos);
                } else {
                    this.smoothedPos.x += dx * pf;
                    this.smoothedPos.y += dy * pf;
                    this.smoothedPos.z += dz * pf;
                    el.setAttribute('position', this.smoothedPos);
                }
                this.smoothedRot.x += (this.rawRot.x - this.smoothedRot.x) * rf;
                this.smoothedRot.y += (this.rawRot.y - this.smoothedRot.y) * rf;
                this.smoothedRot.z += (this.rawRot.z - this.smoothedRot.z) * rf;
                el.setAttribute('rotation', this.smoothedRot);
            }
        });

        // ---------- 模型状态 ----------
        class ModelState {
            constructor(index, el) {
                this.index = index;
                this.el = el;
                this.info = el.getAttribute('data-info') || `模型 ${index}`;
                const s = el.getAttribute('scale');
                const r = el.getAttribute('rotation');
                this.origScale = { x: s.x, y: s.y, z: s.z };
                this.origRot = { x: r.x, y: r.y, z: r.z };
                this.visible = false;
                this.autoRotId = null;
                this._infoTimer = null;
                this.mixer = null;
                this.animations = [];
                this.animNames = [];
                this.fbTicking = false;
                this.playerAnimIdx = 0;
            }
            get scale() { const s = this.el.getAttribute('scale'); return { x: s.x, y: s.y, z: s.z }; }
            get rotation() { const r = this.el.getAttribute('rotation'); return { x: r.x, y: r.y, z: r.z }; }
            setScale(x,y,z) { this.el.setAttribute('scale', {x,y,z}); }
            setRotation(x,y,z) {
                this.el.setAttribute('rotation', {
                    x: x ?? this.rotation.x, y: y ?? this.rotation.y, z: z ?? this.rotation.z
                });
            }
            cancelAutoRot() { if (this.autoRotId) { cancelAnimationFrame(this.autoRotId); this.autoRotId = null; } }

            initAnimation() {
                const obj = this.el.getObject3D('mesh');
                if (!obj || !obj.animations || !obj.animations.length) return;
                this.mixer = new THREE.AnimationMixer(obj);
                this.animations = obj.animations;
                this.animNames = obj.animations.map(c => c.name);
                this.fbTicking = true;
                let last = performance.now();
                const tick = () => {
                    if (!this.mixer || !this.fbTicking) return;
                    const now = performance.now();
                    this.mixer.update(Math.min((now - last)/1000, CONST.FALLBACK_DELTA_CAP));
                    last = now;
                    requestAnimationFrame(tick);
                };
                tick();
            }

            stopAnimation() {
                if (this.mixer) this.mixer.stopAllAction();
                this.playerAnimIdx = 0;
            }

            reset() {

                this.cancelAutoRot();
                this.stopAnimation();

                this.playerAnimIdx = 0;

                if (this.animNames.includes('idle')) {
                    this._playClipByName('idle', true);
                }

                this.setScale(
                    this.origScale.x,
                    this.origScale.y,
                    this.origScale.z
                );

                this.el.object3D.rotation.set(
                    THREE.MathUtils.degToRad(this.origRot.x),
                    THREE.MathUtils.degToRad(this.origRot.y),
                    THREE.MathUtils.degToRad(this.origRot.z)
                );
            }

            _isPlayerModel() {
                return CONST.PLAYER_ANIM_SEQUENCE.every(name => this.animNames.includes(name));
            }

            playAnimation() {
                if (!this.mixer || !this.animations.length) return false;
                if (this._isPlayerModel()) return this._playPlayerStep();
                return this.playAllAnimations();
            }

            _playPlayerStep() {
                const seq = CONST.PLAYER_ANIM_SEQUENCE;
                const idx = this.playerAnimIdx % seq.length;
                const name = seq[idx];
                const loop = CONST.PLAYER_LOOP_ANIMS.has(name);
                const success = this._playClipByName(name, loop);
                if (success) {
                    showAnimLabel(`${name}`);
                    this.playerAnimIdx++;
                    if (name === 'die') {
                        this._onDieFinished(() => {
                            this._playClipByName('idle', true);
                            this.playerAnimIdx = 0;
                            showAnimLabel('idle');
                        });
                    }
                }
                return success;
            }

            _playClipByName(name, loop) {
                if (!this.mixer) return false;
                const clip = this.animations.find(c => c.name === name);
                if (!clip) return false;
                this.mixer.stopAllAction();
                const act = this.mixer.clipAction(clip);
                act.reset();
                act.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce);
                act.clampWhenFinished = !loop;
                act.play();
                return true;
            }

            _onDieFinished(callback) {
                const check = () => {
                    const clip = this.animations.find(c => c.name === 'die');
                    if (!clip) { callback(); return; }
                    const act = this.mixer.clipAction(clip);
                    if (act && act.isRunning()) {
                        requestAnimationFrame(check);
                    } else {
                        callback();
                    }
                };
                requestAnimationFrame(() => requestAnimationFrame(check));
            }
        }

        // ---------- 主控制器 ----------
        class ARController {
            constructor() {
                this.sceneEl = document.querySelector('a-scene');
                this.labelEl = document.getElementById('info-label');
                this.statusEl = document.getElementById('status');
                this.models = new Map();
                this.activeIdx = -1;
                this.gesture = { mode: 'none', initDist: 0, initScale: null, lastX: 0, lastY: 0 };
            }
            get activeModel() { return this.activeIdx >= 0 ? this.models.get(this.activeIdx) : null; }

            init() {
                this.sceneEl.addEventListener('loaded', () => this._onSceneLoaded());
                this._bindButtons();
            }

            _onSceneLoaded() {
                for (let i = 0; i < CONST.MODEL_COUNT; i++) {
                    const el = document.getElementById(CONST.MODEL_IDS[i]);
                    if (!el) continue;
                    const st = new ModelState(i, el);
                    this.models.set(i, st);
                    el.addEventListener('model-loaded', () => st.initAnimation());
                }
                for (let i = 0; i < CONST.MODEL_COUNT; i++) {
                    const target = document.querySelector(`[mindar-image-target="targetIndex: ${i}"]`);
                    if (!target) continue;
                    const idx = i;
                    target.addEventListener('targetFound', () => {
                        const st = this.models.get(idx);
                        if (!st) return;
                        st.visible = true;
                        this.activeIdx = idx;
                        this.statusEl.textContent = `识别图 ${idx+1} 已追踪`;
                    });
                    target.addEventListener('targetLost', () => {
                        const st = this.models.get(idx);
                        if (!st) return;
                        st.visible = false;
                        if (this.activeIdx === idx) {
                            this.activeIdx = -1;
                            this.statusEl.textContent = '';
                            this.labelEl.classList.remove('visible');
                            animLabelEl.classList.remove('visible');
                        }
                    });
                }
                this._bindGestures();
                this.sceneEl.canvas.addEventListener('wheel', e => this._onWheel(e), { passive: false });
            }

            _bindGestures() {
                const c = this.sceneEl.canvas;
                c.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const touches = e.touches;
                    if (touches.length === 1) {
                        this.gesture.mode = 'rotate';
                        this.gesture.lastX = touches[0].clientX;
                        this.gesture.lastY = touches[0].clientY;
                    } else if (touches.length === 2) {
                        this.gesture.mode = 'scale';
                        this.gesture.initDist = this._getDist(e);
                        const st = this.activeModel;
                        if (st) { this.gesture.initScale = st.scale; }
                    } else {
                        this.gesture.mode = 'none';
                    }
                }, { passive: false });

                c.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    if (!this.activeModel) return;
                    const st = this.activeModel;
                    if (this.gesture.mode === 'rotate' && e.touches.length === 1) {
                        st.cancelAutoRot();
                        const dx = e.touches[0].clientX - this.gesture.lastX;
                        const dy = e.touches[0].clientY - this.gesture.lastY;
                        this._applyScreenRotation(dx, dy);
                        this.gesture.lastX = e.touches[0].clientX;
                        this.gesture.lastY = e.touches[0].clientY;
                    } else if (this.gesture.mode === 'scale' && e.touches.length === 2 && this.gesture.initScale) {
                        const ratio = this._getDist(e) / this.gesture.initDist;
                        const s = this.gesture.initScale;
                        st.setScale(s.x * ratio, s.y * ratio, s.z * ratio);
                    }
                }, { passive: false });

                c.addEventListener('touchend', (e) => { if (e.touches.length < 2) this.gesture.mode = 'none'; });
                c.addEventListener('touchcancel', () => { this.gesture.mode = 'none'; });
            }

            _getDist(e) {
                const t0 = e.touches[0], t1 = e.touches[1];
                return Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
            }

            _applyScreenRotation(dx, dy) {

                const st = this.activeModel;
                if (!st) return;

                const obj = st.el.object3D;

                // 只看左右滑动
                const angle =
                    THREE.MathUtils.degToRad(
                        -dx * CONST.SWIPE_SENSITIVITY
                    );

                // 获取当前相机朝向
                const camQuat = new THREE.Quaternion();

                this.sceneEl.camera.getWorldQuaternion(camQuat);

                // 相机的上方向
                const cameraUp = new THREE.Vector3(0, 1, 0)
                    .applyQuaternion(camQuat)
                    .normalize();

                const q = new THREE.Quaternion();

                q.setFromAxisAngle(
                    cameraUp,
                    angle
                );

                // 围绕镜头竖直方向旋转
                obj.quaternion.premultiply(q);
            }

            _onWheel(e) {
                if (!this.activeModel) return;
                e.preventDefault();
                const s = this.activeModel.scale;
                const f = e.deltaY > 0 ? CONST.WHEEL_FACTOR : 1/CONST.WHEEL_FACTOR;
                this.activeModel.setScale(s.x*f, s.y*f, s.z*f);
            }

            scaleStep(factor) {
                const st = this.activeModel;
                if (!st) return;
                const s = st.scale;
                st.setScale(s.x*factor, s.y*factor, s.z*factor);
                vibrate(CONST.VIBRATE.CLICK);
            }
            resetModel() {
                const st = this.activeModel;
                if (!st) return;
                st.reset();
                document.getElementById('btn-autorot').classList.remove('active');
                vibrate(CONST.VIBRATE.RESET);
            }
            showInfo() {
                const st = this.activeModel;
                if (!st) return;
                this.labelEl.textContent = st.info;
                this.labelEl.classList.add('visible');
                vibrate(CONST.VIBRATE.INFO);
                clearTimeout(st._infoTimer);
                st._infoTimer = setTimeout(() => this.labelEl.classList.remove('visible'), CONST.INFO_DURATION);
            }
            toggleAutoRot() {
                const st = this.activeModel;
                if (!st) return;
                const btn = document.getElementById('btn-autorot');
                if (st.autoRotId) { st.cancelAutoRot(); btn.classList.remove('active'); return; }
                btn.classList.add('active');
                const rot = () => {

                    const obj = st.el.object3D;

                    obj.rotateX(
                        THREE.MathUtils.degToRad(CONST.AUTO_ROT_SPEED.x)
                    );

                    obj.rotateY(
                        THREE.MathUtils.degToRad(CONST.AUTO_ROT_SPEED.y)
                    );

                    obj.rotateZ(
                        THREE.MathUtils.degToRad(CONST.AUTO_ROT_SPEED.z)
                    );

                    st.autoRotId = requestAnimationFrame(rot);
                };
                st.autoRotId = requestAnimationFrame(rot);
            }
            rotateAxis(axis, deg) {

                const st = this.activeModel;
                if (!st) return;

                st.cancelAutoRot();

                const obj = st.el.object3D;

                const q = new THREE.Quaternion();

                switch(axis) {

                    case 'x':
                        q.setFromAxisAngle(
                            new THREE.Vector3(1, 0, 0),
                            THREE.MathUtils.degToRad(deg)
                        );
                        break;

                    case 'y':
                        q.setFromAxisAngle(
                            new THREE.Vector3(0, 1, 0),
                            THREE.MathUtils.degToRad(deg)
                        );
                        break;

                    case 'z':
                        q.setFromAxisAngle(
                            new THREE.Vector3(0, 0, 1),
                            THREE.MathUtils.degToRad(deg)
                        );
                        break;
                }

                // 绕模型自身坐标轴旋转
                obj.quaternion.multiply(q);

                vibrate(CONST.VIBRATE.CLICK);
            }
            playAnimation() {
                const st = this.activeModel;
                if (!st) return;
                if (!st.hasAnimation()) { showToast('⚠ 该模型没有动画'); return; }
                if (st.playAnimation()) { vibrate(CONST.VIBRATE.ANIM_START); }
                else { showToast('⚠ 该模型没有动画'); }
            }

            _bindButtons() {
                const bind = (id, fn) => {
                    const el = document.getElementById(id);
                    if (el) el.addEventListener('pointerdown', e => { e.preventDefault(); fn(); });
                };
                bind('btn-rx-n', () => this.rotateAxis('x', -CONST.ROT_STEP));
                bind('btn-rx-p', () => this.rotateAxis('x',  CONST.ROT_STEP));
                bind('btn-ry-n', () => this.rotateAxis('y', -CONST.ROT_STEP));
                bind('btn-ry-p', () => this.rotateAxis('y',  CONST.ROT_STEP));
                bind('btn-rz-n', () => this.rotateAxis('z', -CONST.ROT_STEP));
                bind('btn-rz-p', () => this.rotateAxis('z',  CONST.ROT_STEP));
                bind('btn-scaleup', () => this.scaleStep(CONST.SCALE_UP));
                bind('btn-scaledn', () => this.scaleStep(CONST.SCALE_DOWN));
                bind('btn-reset',   () => this.resetModel());
                bind('btn-info',    () => this.showInfo());
                bind('btn-autorot', () => this.toggleAutoRot());
                bind('btn-anim',    () => this.playAnimation());
            }
        }

        new ARController().init();
    </script>
</body>
</html>
