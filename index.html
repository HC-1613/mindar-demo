<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

    <style>
        :root {
            --bg-panel: rgba(0, 0, 0, 0.55);
            --bg-btn: rgba(255, 255, 255, 0.1);
            --bg-btn-active: rgba(76, 175, 80, 0.5);
            --border-btn: rgba(255, 255, 255, 0.35);
            --color-text: #fff;
            --radius-pill: 26px;
            --radius-round: 50%;
            --font-mono: 'SF Mono', 'Fira Code', monospace;
            --btn-size: 41px;
            --rot-btn-size: 28px;
            --tap-highlight: transparent;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: var(--tap-highlight);
            user-select: none;
            -webkit-user-select: none;
        }

        /* ---- 顶部提示 ---- */
        #hint {
            position: fixed;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            font-family: system-ui, sans-serif;
            font-size: 11px;
            background: var(--bg-panel);
            padding: 5px 14px;
            border-radius: 12px;
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
        }

        /* ---- 状态指示 ---- */
        #status {
            position: fixed;
            top: 38px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-family: system-ui, sans-serif;
            font-size: 10px;
            z-index: 100;
            pointer-events: none;
        }

        /* ---- 信息标签 ---- */
        #info-label {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: var(--color-text);
            padding: 10px 24px;
            border-radius: 22px;
            font-family: system-ui, sans-serif;
            font-size: 15px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }
        #info-label.visible {
            opacity: 1;
        }

        /* ---- Toast 提示 ---- */
        #toast {
            position: fixed;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: var(--color-text);
            padding: 8px 20px;
            border-radius: 20px;
            font-family: system-ui, sans-serif;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 110;
            white-space: nowrap;
        }
        #toast.visible {
            opacity: 1;
        }

        /* ---- 底部统一工具栏 ---- */
        #toolbar {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 4px 10px 8px 10px;
            border-radius: var(--radius-pill);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        /* ---- 旋转轴工具栏 ---- */
        #toolbar-rot {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 4px 0 6px 0;
        }
        #toolbar-rot .axis-label {
            color: rgba(255, 255, 255, 0.55);
            font-family: system-ui, sans-serif;
            font-size: 9px;
            font-weight: bold;
            width: 12px;
            text-align: center;
        }
        .rot-btn {
            width: var(--rot-btn-size);
            height: var(--rot-btn-size);
            border-radius: var(--radius-round);
            border: 1px solid var(--border-btn);
            background: var(--bg-btn);
            color: var(--color-text);
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }
        .rot-btn:active {
            background: rgba(255, 255, 255, 0.3);
        }

        /* ---- 功能按钮 ---- */
        #toolbar-func {
            display: flex;
            gap: 7px;
            flex-wrap: wrap;
            justify-content: center;
        }
        #toolbar-func button {
            width: var(--btn-size);
            height: var(--btn-size);
            border-radius: var(--radius-round);
            border: 1.5px solid var(--border-btn);
            background: var(--bg-btn);
            color: var(--color-text);
            font-size: 17px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, border-color 0.15s;
        }
        #toolbar-func button:active {
            background: rgba(255, 255, 255, 0.3);
        }
        #toolbar-func button.active {
            background: var(--bg-btn-active);
            border-color: #4caf50;
        }
    </style>
</head>

<body>
    <div id="hint">☝ 双指旋转Y/缩放 &nbsp;|&nbsp; 按钮控制XYZ轴</div>
    <div id="status"></div>
    <div id="info-label"></div>
    <div id="toast"></div>

    <!-- 底部统一工具栏 -->
    <div id="toolbar">
        <!-- 旋转轴控制 -->
        <div id="toolbar-rot">
            <span class="axis-label">X</span>
            <button class="rot-btn" id="btn-rx-n" title="绕X轴负转">↺</button>
            <button class="rot-btn" id="btn-rx-p" title="绕X轴正转">↻</button>
            <span class="axis-label">Y</span>
            <button class="rot-btn" id="btn-ry-n" title="绕Y轴负转">↺</button>
            <button class="rot-btn" id="btn-ry-p" title="绕Y轴正转">↻</button>
            <span class="axis-label">Z</span>
            <button class="rot-btn" id="btn-rz-n" title="绕Z轴负转">↺</button>
            <button class="rot-btn" id="btn-rz-p" title="绕Z轴正转">↻</button>
        </div>
        <!-- 功能按钮 -->
        <div id="toolbar-func">
            <button id="btn-spin" title="旋转弹跳">🔄</button>
            <button id="btn-scaleup" title="放大">➕</button>
            <button id="btn-scaledn" title="缩小">➖</button>
            <button id="btn-reset" title="重置">↺</button>
            <button id="btn-info" title="信息">ℹ️</button>
            <button id="btn-autorot" title="自动旋转">▶</button>
            <button id="btn-wire" title="线框模式">🔲</button>
            <button id="btn-anim" title="播放动画">▶️</button>
        </div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- 图片1 -->
        <a-entity mindar-image-target="targetIndex: 0" smooth-ar>
            <a-gltf-model id="model-0" data-info="📚 图书馆模型" src="library.glb"
                position="0 0 0" rotation="90 0 0" scale="0.005 0.005 0.005"></a-gltf-model>
        </a-entity>

        <!-- 图片2 -->
        <a-entity mindar-image-target="targetIndex: 1" smooth-ar>
            <a-gltf-model id="model-1" data-info="🗿 绿色头像" src="head-green.glb"
                position="0 0 0" scale="0.1 0.1 0.1"></a-gltf-model>
        </a-entity>

        <!-- 图片3 -->
        <a-entity mindar-image-target="targetIndex: 2" smooth-ar>
            <a-gltf-model id="model-2" data-info="📦 盒子模型" src="box.glb"
                position="0 0 0" scale="0.1 0.1 0.1"></a-gltf-model>
        </a-entity>

        <!-- 图片4: 骨骼动画模型 -->
        <a-entity mindar-image-target="targetIndex: 3" smooth-ar="posFactor: 0.2; rotFactor: 0.3; minDelta: 0.0003">
            <a-gltf-model id="model-3" data-info="💀 动画模型" src="dying.glb"
                position="0 0 0" scale="0.1 0.1 0.1" animation-mixer="loop: once">
            </a-gltf-model>
        </a-entity>

        <!-- 图片5: 骨骼动画模型 -->
        <a-entity mindar-image-target="targetIndex: 4" smooth-ar="posFactor: 0.2; rotFactor: 0.3; minDelta: 0.0003">
            <a-gltf-model id="model-4" data-info="💀 动画模型" src="dying.glb"
                position="0 0 0" scale="0.1 0.1 0.1" animation-mixer="loop: once">
            </a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        // ==================== 常量 ====================
        const CONST = {
            MODEL_COUNT: 5,
            ROT_STEP: 30,
            SCALE_UP: 1.2,
            SCALE_DOWN: 0.8,
            WHEEL_FACTOR: 0.9,
            SPIN_DURATION: 1500,
            SPIN_BOUNCE_COUNT: 2,
            SPIN_BOUNCE_AMP: 0.35,
            AUTO_ROT_SPEED: { x: 0.3, y: 0.6, z: 0.2 },
            INFO_DURATION: 2000,
            TOAST_DURATION: 1800,
            FALLBACK_DELTA_CAP: 0.1,
            VIBRATE: {
                CLICK: 10,
                SPIN_START: 20,
                SPIN_END: 15,
                INFO: 25,
                RESET: [10, 30, 10],
            },
        };

        // ==================== 工具函数 ====================
        const vibrate = (pattern) => {
            if (navigator.vibrate) navigator.vibrate(pattern);
        };

        const clamp = (val, min, max) => Math.min(max, Math.max(min, val));

        const normAngle = (deg) => ((deg % 360) + 360) % 360;

        // ==================== Toast 提示 ====================
        let toastTimer = null;
        const toastEl = document.getElementById('toast');

        const showToast = (msg) => {
            if (toastTimer) clearTimeout(toastTimer);
            toastEl.textContent = msg;
            toastEl.classList.add('visible');
            toastTimer = setTimeout(() => toastEl.classList.remove('visible'), CONST.TOAST_DURATION);
        };

        // ==================== smooth-ar 组件 ====================
        AFRAME.registerComponent('smooth-ar', {
            schema: {
                posFactor: { default: 0.25 },
                rotFactor: { default: 0.35 },
                minDelta: { default: 0.0005 },
            },
            init() {
                this.smoothedPos = new THREE.Vector3();
                this.smoothedRot = new THREE.Vector3();
                this.rawPos = new THREE.Vector3();
                this.rawRot = new THREE.Vector3();
                this.initialized = false;
            },
            tick() {
                const el = this.el;
                const pos = el.getAttribute('position');
                const rot = el.getAttribute('rotation');

                if (!this.initialized) {
                    this.smoothedPos.set(pos.x, pos.y, pos.z);
                    this.smoothedRot.set(rot.x, rot.y, rot.z);
                    this.initialized = true;
                    return;
                }

                this.rawPos.set(pos.x, pos.y, pos.z);
                this.rawRot.set(rot.x, rot.y, rot.z);

                const { posFactor: pf, rotFactor: rf, minDelta } = this.data;
                const dx = this.rawPos.x - this.smoothedPos.x;
                const dy = this.rawPos.y - this.smoothedPos.y;
                const dz = this.rawPos.z - this.smoothedPos.z;
                const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

                if (dist < minDelta) {
                    el.setAttribute('position', this.smoothedPos);
                } else {
                    this.smoothedPos.x += dx * pf;
                    this.smoothedPos.y += dy * pf;
                    this.smoothedPos.z += dz * pf;
                    el.setAttribute('position', this.smoothedPos);
                }

                this.smoothedRot.x += (this.rawRot.x - this.smoothedRot.x) * rf;
                this.smoothedRot.y += (this.rawRot.y - this.smoothedRot.y) * rf;
                this.smoothedRot.z += (this.rawRot.z - this.smoothedRot.z) * rf;
                el.setAttribute('rotation', this.smoothedRot);
            },
        });

        // ==================== 状态管理 ====================
        class ModelState {
            constructor(index, el) {
                this.index = index;
                this.el = el;
                this.info = el.getAttribute('data-info') || `模型 ${index}`;
                const s = el.getAttribute('scale');
                const r = el.getAttribute('rotation');
                this.origScale = { x: s.x, y: s.y, z: s.z };
                this.origRot = { x: r.x, y: r.y, z: r.z };
                this.visible = false;
                this.animId = null;
                this.autoRotId = null;
                this.fallbackMixer = null;
                this.fbTicking = false;
                this.wireframe = false;
                this._infoTimer = null;
            }

            get scale() {
                const s = this.el.getAttribute('scale');
                return { x: s.x, y: s.y, z: s.z };
            }
            get rotation() {
                const r = this.el.getAttribute('rotation');
                return { x: r.x, y: r.y, z: r.z };
            }

            setScale(x, y, z) {
                this.el.setAttribute('scale', { x, y, z });
            }
            setRotation(x, y, z) {
                this.el.setAttribute('rotation', { x: x ?? this.rotation.x, y: y ?? this.rotation.y, z: z ?? this.rotation.z });
            }

            cancelAnim() {
                if (this.animId) {
                    cancelAnimationFrame(this.animId);
                    this.animId = null;
                }
            }
            cancelAutoRot() {
                if (this.autoRotId) {
                    cancelAnimationFrame(this.autoRotId);
                    this.autoRotId = null;
                }
            }
            cancelFallbackTicking() {
                this.fbTicking = false;
            }
            stopFallbackMixer() {
                if (this.fallbackMixer) {
                    this.fallbackMixer.stopAllAction();
                    this.cancelFallbackTicking();
                }
            }
            reset() {
                this.cancelAnim();
                this.cancelAutoRot();
                this.setScale(this.origScale.x, this.origScale.y, this.origScale.z);
                this.setRotation(this.origRot.x, this.origRot.y, this.origRot.z);
                this.wireframe = false;
            }

            /** 检查模型是否有动画 */
            hasAnimation() {
                const mixComp = this.el.components['animation-mixer'];
                if (mixComp && mixComp.mixer && mixComp.animations && mixComp.animations.length > 0) {
                    return true;
                }
                const obj3D = this.el.getObject3D('mesh');
                return !!(obj3D && obj3D.animations && obj3D.animations.length > 0);
            }

            /** 播放动画，返回 true 表示播放成功 */
            playAnimation() {
                // 方法1: animation-mixer 组件
                const mixComp = this.el.components['animation-mixer'];
                if (mixComp && mixComp.mixer && mixComp.animations && mixComp.animations.length > 0) {
                    mixComp.mixer.stopAllAction();
                    mixComp.animations.forEach((clip) => {
                        const act = mixComp.mixer.clipAction(clip);
                        act.reset();
                        act.play();
                    });
                    return true;
                }

                // 方法2: 直接从 object3D 获取
                const obj3D = this.el.getObject3D('mesh');
                if (!obj3D || !obj3D.animations || obj3D.animations.length === 0) {
                    return false;
                }

                if (!this.fallbackMixer) {
                    this.fallbackMixer = new THREE.AnimationMixer(obj3D);
                    this.fbTicking = true;
                    let lastTime = performance.now();
                    const tick = () => {
                        if (!this.fallbackMixer || !this.fbTicking) return;
                        const now = performance.now();
                        const delta = Math.min((now - lastTime) / 1000, CONST.FALLBACK_DELTA_CAP);
                        lastTime = now;
                        this.fallbackMixer.update(delta);
                        requestAnimationFrame(tick);
                    };
                    tick();
                }
                this.fallbackMixer.stopAllAction();
                obj3D.animations.forEach((clip) => {
                    const act = this.fallbackMixer.clipAction(clip);
                    act.reset();
                    act.play();
                });
                return true;
            }

            toggleWireframe() {
                this.el.object3D.traverse((node) => {
                    if (node.isMesh && node.material) {
                        const mats = Array.isArray(node.material) ? node.material : [node.material];
                        mats.forEach((m) => (m.wireframe = !m.wireframe));
                    }
                });
                this.wireframe = !this.wireframe;
            }
        }

        // ==================== 主控制器 ====================
        class ARController {
            constructor() {
                this.sceneEl = document.querySelector('a-scene');
                this.labelEl = document.getElementById('info-label');
                this.statusEl = document.getElementById('status');
                this.models = new Map(); // index → ModelState
                this.activeIdx = -1;
                this.gestureActive = false;
                this.gestureInit = { dist: 0, angle: 0, scale: null, rot: null };
            }

            init() {
                this.sceneEl.addEventListener('loaded', () => this._onSceneLoaded());
                this._bindButtons();
            }

            get activeModel() {
                return this.activeIdx >= 0 ? this.models.get(this.activeIdx) : null;
            }

            _onSceneLoaded() {
                // 初始化模型
                for (let i = 0; i < CONST.MODEL_COUNT; i++) {
                    const el = document.getElementById('model-' + i);
                    if (!el) continue;
                    this.models.set(i, new ModelState(i, el));
                }

                // 绑定识别事件
                for (let i = 0; i < CONST.MODEL_COUNT; i++) {
                    const target = document.querySelector(`[mindar-image-target="targetIndex: ${i}"]`);
                    if (!target) continue;
                    target.addEventListener('targetFound', () => {
                        const st = this.models.get(i);
                        if (!st) return;
                        st.visible = true;
                        this.activeIdx = i;
                        this.statusEl.textContent = `📍 识别图 ${i + 1} 已追踪`;
                    });
                    target.addEventListener('targetLost', () => {
                        const st = this.models.get(i);
                        if (!st) return;
                        st.visible = false;
                        st.cancelFallbackTicking();
                        if (this.activeIdx === i) {
                            this.activeIdx = -1;
                            this.statusEl.textContent = '';
                            this.labelEl.classList.remove('visible');
                        }
                    });
                }

                // 绑定手势
                this._bindGestures();
                // 绑定 PC 滚轮
                this.sceneEl.canvas.addEventListener('wheel', (e) => this._onWheel(e), { passive: false });
            }

            // ========== 手势：双指缩放 + Y轴旋转 ==========
            _bindGestures() {
                const c = this.sceneEl.canvas;
                const getDist = (e) => {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    return Math.sqrt(dx * dx + dy * dy);
                };
                const getAngle = (e) => {
                    return Math.atan2(
                        e.touches[1].clientY - e.touches[0].clientY,
                        e.touches[1].clientX - e.touches[0].clientX
                    ) * 180 / Math.PI;
                };

                c.addEventListener('touchstart', (e) => {
                    if (e.touches.length !== 2 || !this.activeModel) return;
                    e.preventDefault();
                    this.activeModel.cancelAnim();
                    this.gestureActive = true;
                    this.gestureInit.dist = getDist(e);
                    this.gestureInit.angle = getAngle(e);
                    this.gestureInit.scale = this.activeModel.scale;
                    this.gestureInit.rot = this.activeModel.rotation;
                }, { passive: false });

                c.addEventListener('touchmove', (e) => {
                    if (!this.gestureActive || e.touches.length !== 2 || !this.activeModel) return;
                    e.preventDefault();
                    const ratio = getDist(e) / this.gestureInit.dist;
                    const s = this.gestureInit.scale;
                    this.activeModel.setScale(s.x * ratio, s.y * ratio, s.z * ratio);

                    const delta = getAngle(e) - this.gestureInit.angle;
                    const r = this.gestureInit.rot;
                    this.activeModel.setRotation(r.x, r.y + delta, r.z);
                }, { passive: false });

                const endGesture = () => {
                    this.gestureActive = false;
                    this.gestureInit.scale = null;
                    this.gestureInit.rot = null;
                };
                c.addEventListener('touchend', endGesture);
                c.addEventListener('touchcancel', endGesture);
            }

            _onWheel(e) {
                if (!this.activeModel) return;
                e.preventDefault();
                this.activeModel.cancelAnim();
                const s = this.activeModel.scale;
                const f = e.deltaY > 0 ? CONST.WHEEL_FACTOR : 1 / CONST.WHEEL_FACTOR;
                this.activeModel.setScale(s.x * f, s.y * f, s.z * f);
            }

            // ========== 功能方法 ==========
            spinBounce() {
                const st = this.activeModel;
                if (!st) return;
                st.cancelAnim();
                const startScale = st.scale;
                const startRot = st.rotation;
                const bounceAmp = startScale.y * CONST.SPIN_BOUNCE_AMP;
                const startTime = performance.now();
                vibrate(CONST.VIBRATE.SPIN_START);

                const step = (now) => {
                    const t = Math.min((now - startTime) / CONST.SPIN_DURATION, 1);
                    const bounce = Math.sin(t * Math.PI * 2 * CONST.SPIN_BOUNCE_COUNT) * bounceAmp * (1 - t);
                    st.setRotation(startRot.x + t * 360, startRot.y + t * 360, startRot.z);
                    st.setScale(startScale.x + bounce, startScale.y + bounce, startScale.z + bounce);

                    if (t < 1) {
                        st.animId = requestAnimationFrame(step);
                    } else {
                        st.setScale(startScale.x, startScale.y, startScale.z);
                        st.setRotation(
                            normAngle(startRot.x + 360),
                            normAngle(startRot.y + 360),
                            startRot.z
                        );
                        st.animId = null;
                        vibrate(CONST.VIBRATE.SPIN_END);
                    }
                };
                st.animId = requestAnimationFrame(step);
            }

            scaleStep(factor) {
                const st = this.activeModel;
                if (!st) return;
                st.cancelAnim();
                const s = st.scale;
                st.setScale(s.x * factor, s.y * factor, s.z * factor);
                vibrate(CONST.VIBRATE.CLICK);
            }

            resetModel() {
                const st = this.activeModel;
                if (!st) return;
                st.reset();
                document.getElementById('btn-autorot').classList.remove('active');
                document.getElementById('btn-wire').classList.remove('active');
                vibrate(CONST.VIBRATE.RESET);
            }

            showInfo() {
                const st = this.activeModel;
                if (!st) return;
                this.labelEl.textContent = st.info;
                this.labelEl.classList.add('visible');
                vibrate(CONST.VIBRATE.INFO);
                clearTimeout(st._infoTimer);
                st._infoTimer = setTimeout(() => this.labelEl.classList.remove('visible'), CONST.INFO_DURATION);
            }

            toggleAutoRot() {
                const st = this.activeModel;
                if (!st) return;
                const btn = document.getElementById('btn-autorot');
                if (st.autoRotId) {
                    st.cancelAutoRot();
                    btn.classList.remove('active');
                    return;
                }
                btn.classList.add('active');
                st.cancelAnim();
                const rotate = () => {
                    const r = st.rotation;
                    st.setRotation(
                        r.x + CONST.AUTO_ROT_SPEED.x,
                        r.y + CONST.AUTO_ROT_SPEED.y,
                        r.z + CONST.AUTO_ROT_SPEED.z
                    );
                    st.autoRotId = requestAnimationFrame(rotate);
                };
                st.autoRotId = requestAnimationFrame(rotate);
            }

            rotateAxis(axis, deg) {
                const st = this.activeModel;
                if (!st) return;
                st.cancelAnim();
                const rot = { ...st.rotation };
                rot[axis] += deg;
                st.setRotation(rot.x, rot.y, rot.z);
                vibrate(CONST.VIBRATE.CLICK);
            }

            toggleWireframe() {
                const st = this.activeModel;
                if (!st) return;
                st.toggleWireframe();
                const btn = document.getElementById('btn-wire');
                btn.classList.toggle('active', st.wireframe);
                vibrate(CONST.VIBRATE.CLICK);
            }

            playAnimation() {
                const st = this.activeModel;
                if (!st) return;
                if (!st.hasAnimation()) {
                    showToast('⚠ 该模型没有动画');
                    return;
                }
                const ok = st.playAnimation();
                if (ok) {
                    vibrate(CONST.VIBRATE.SPIN_START);
                } else {
                    showToast('⚠ 该模型没有动画');
                }
            }

            // ========== UI 绑定 ==========
            _bindButtons() {
                const bind = (id, handler) => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    el.addEventListener('pointerdown', (e) => {
                        e.preventDefault();
                        handler();
                    });
                };

                // XYZ 旋转
                bind('btn-rx-n', () => this.rotateAxis('x', -CONST.ROT_STEP));
                bind('btn-rx-p', () => this.rotateAxis('x', CONST.ROT_STEP));
                bind('btn-ry-n', () => this.rotateAxis('y', -CONST.ROT_STEP));
                bind('btn-ry-p', () => this.rotateAxis('y', CONST.ROT_STEP));
                bind('btn-rz-n', () => this.rotateAxis('z', -CONST.ROT_STEP));
                bind('btn-rz-p', () => this.rotateAxis('z', CONST.ROT_STEP));

                // 功能按钮
                bind('btn-spin', () => this.spinBounce());
                bind('btn-scaleup', () => this.scaleStep(CONST.SCALE_UP));
                bind('btn-scaledn', () => this.scaleStep(CONST.SCALE_DOWN));
                bind('btn-reset', () => this.resetModel());
                bind('btn-info', () => this.showInfo());
                bind('btn-autorot', () => this.toggleAutoRot());
                bind('btn-wire', () => this.toggleWireframe());
                bind('btn-anim', () => this.playAnimation());
            }
        }

        // ==================== 启动 ====================
        const controller = new ARController();
        controller.init();
    </script>
</body>
</html>
