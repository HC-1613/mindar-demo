<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>
    <a-scene
        mindar-image="
            imageTargetSrc: ./targets.mind;
            filterMinCF: 0.001;
            filterBeta: 30;
        "
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-camera
            position="0 0 0"
            look-controls="enabled: false">
        </a-camera>

        <!-- 图片1 -->
        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model
                src="library.glb"
                smooth-follow
                position="0 0 -0.05"
                rotation="90 0 0"
                scale="0.005 0.005 0.005">
            </a-gltf-model>
        </a-entity>

        <!-- 图片2 -->
        <a-entity mindar-image-target="targetIndex: 1">
            <a-gltf-model
                src="head-green.glb"
                smooth-follow
                position="0 0 0"
                scale="0.1 0.1 0.1">
            </a-gltf-model>
        </a-entity>

        <!-- 图片3 -->
        <a-entity mindar-image-target="targetIndex: 2">
            <a-gltf-model
                src="box.glb"
                smooth-follow
                position="0 0 0"
                scale="0.1 0.1 0.1">
            </a-gltf-model>
        </a-entity>

        <!-- 图片4 -->
        <a-entity mindar-image-target="targetIndex: 3">
            <a-gltf-model
                src="ball.glb"
                smooth-follow
                position="0 0 0"
                scale="0.1 0.1 0.1">
            </a-gltf-model>
        </a-entity>

    </a-scene>

    <script>
    AFRAME.registerComponent('smooth-follow', {
        init: function () {
            this.lerpFactor = 0.2;

            this.lastPos = new THREE.Vector3();
            this.currentPos = new THREE.Vector3();
        },

        tick: function () {
            let obj = this.el.object3D;

            // 当前 AR 计算位置
            this.currentPos.copy(obj.position);

            // 平滑
            this.lastPos.lerp(this.currentPos, this.lerpFactor);

            // 写回
            obj.position.copy(this.lastPos);
        }
    });
    </script>

</body>
</html>
